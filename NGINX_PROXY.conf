# Nginx Configuration for JAAGO Core
# Add these locations to your server block in /etc/nginx/sites-available/default

server {
    listen 80;
    server_name jaagocore.jaago.com.bd;
    root /var/www/jaagocore/dist;
    index index.html;

    # Handle Frontend Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Odoo API requests
    location /odoo-api/ {
        proxy_pass https://jaago-foundation.odoo.com/;
        proxy_set_header Host jaago-foundation.odoo.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Spoof Origin to satisfy Odoo CORS/CSRF
        proxy_set_header Origin https://jaago-foundation.odoo.com;
        proxy_set_header Referer https://jaago-foundation.odoo.com/;
        
        # Handle CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
