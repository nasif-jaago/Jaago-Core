# Nginx Production Configuration for JAAGO Core
# Implementation for jaagocore.jaago.com.bd

server {
    listen 80;
    server_name jaagocore.jaago.com.bd;
    
    root /var/www/jaagocore/dist;
    index index.html;

    # 1. PROXY CONFIGURATION (REQUIRED FIX)
    location /odoo-api/ {
        proxy_pass https://jaago-foundation.odoo.com/;
        
        # Preservation of headers
        proxy_set_header Host jaago-foundation.odoo.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Session/Cookie support
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_domain jaago-foundation.odoo.com jaagocore.jaago.com.bd;
        
        # Spoof Origin for Odoo CSRF safety
        proxy_set_header Origin https://jaago-foundation.odoo.com;
        proxy_set_header Referer https://jaago-foundation.odoo.com/;
        
        proxy_redirect off;

        # Handle CORS
        add_header 'Access-Control-Allow-Origin' 'https://jaagocore.jaago.com.bd' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 2. FRONTEND SPA ROUTING
    location / {
        try_files $uri $uri/ /index.html;
    }
}
